<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SkillWork Support Chat</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <link rel="stylesheet" href="user.css" />
</head>
<body>
  <div id="error" class="error-banner hidden"></div>

  <div class="user-app" id="app">
    <header class="user-header">
      <h1 id="headerTitle">💬 Support Chat</h1>
      <p id="headerSub">Message our team — we reply within 24 hours</p>
    </header>

    <div id="blockedBanner" class="block-banner hidden">
      This chat has been blocked by support. You cannot send new messages.
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyHint">Say hello to start the conversation</div>
    </div>

    <div class="quick-row" id="quickReplies"></div>

    <form class="composer" id="composerForm">
      <button type="button" class="composer-attach" id="attachBtn" title="Send image">📷</button>
      <input type="file" id="imageInput" accept="image/*" capture="environment" hidden />
      <input type="text" id="messageInput" placeholder="Type a message…" autocomplete="off" maxlength="2000" />
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <script src="../shared/firebase-config.js"></script>
  <script src="../shared/chat-core.js"></script>
  <script src="user.js"></script>
</body>
</html>
